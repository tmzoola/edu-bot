<!DOCTYPE html>
<html lang="uz">
<head>
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('malaka-admin-theme')||'light');}catch(e){}</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Xabar yuborish — Muslima Darmonova Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;color:#3b4256;min-height:100vh}
.top{background:#fff;border-bottom:1px solid rgba(0,0,0,.07);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.top-left{display:flex;align-items:center;gap:14px}
.brand{display:flex;align-items:center;gap:10px;color:#111827;font-weight:700;font-size:1rem;text-decoration:none}
.brand-ic{width:32px;height:32px;background:linear-gradient(135deg,#6c63f6,#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff}
.back-link{color:#6b7280;text-decoration:none;font-size:.85rem;display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;transition:.15s}
.back-link:hover{background:rgba(0,0,0,.04);color:#111827}

.wrap{max-width:820px;margin:0 auto;padding:28px}
.page-title{font-size:1.7rem;font-weight:800;color:#111827;margin:0 0 4px;display:flex;align-items:center;gap:12px}
.page-sub{color:#6b7280;font-size:.9rem;margin:0 0 20px}

.card{background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:22px;box-shadow:0 1px 3px rgba(16,24,40,.06);margin-bottom:16px}
.row{margin-bottom:16px}
.row:last-child{margin-bottom:0}
label{display:block;font-size:.78rem;font-weight:700;color:#4b5563;margin-bottom:6px;text-transform:uppercase;letter-spacing:.03em}
input, textarea{width:100%;padding:12px 14px;border:1.5px solid rgba(0,0,0,.1);border-radius:10px;font-size:.92rem;font-family:inherit;background:#fff;color:#1f2430;transition:.15s}
input:focus, textarea:focus{outline:none;border-color:#6c63f6;box-shadow:0 0 0 3px rgba(108,99,246,.12)}
textarea{min-height:180px;resize:vertical;line-height:1.55}
.hint{font-size:.72rem;color:#6b7280;margin-top:6px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.stats-bar{display:flex;gap:14px;padding:14px 18px;background:rgba(108,99,246,.06);border:1px solid rgba(108,99,246,.15);border-radius:10px;margin-bottom:18px}
.stat{flex:1}
.stat .v{font-size:1.35rem;font-weight:800;color:#6c63f6}
.stat .l{font-size:.72rem;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;font-weight:600}

.btn{padding:12px 22px;border:none;border-radius:10px;font-weight:700;font-size:.9rem;cursor:pointer;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:linear-gradient(135deg,#6c63f6,#8b5cf6);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(108,99,246,.35)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;color:#6b7280}
.btn-ghost:hover{background:rgba(0,0,0,.04);color:#111827}

.msg{padding:14px 16px;border-radius:10px;font-size:.88rem;margin-bottom:16px;font-weight:600;display:none}
.msg.show{display:block}
.msg-ok{background:rgba(34,197,138,.12);border:1px solid rgba(34,197,138,.3);color:#15803d}
.msg-err{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:#b91c1c}
.msg-info{background:rgba(108,140,255,.1);border:1px solid rgba(108,140,255,.25);color:#4f46e5}

html[data-theme="dark"] body{background:#0b0e18;color:#cdd3e0}
html[data-theme="dark"] .top{background:#0b0e18;border-color:rgba(255,255,255,.05)}
html[data-theme="dark"] .brand,html[data-theme="dark"] .page-title{color:#fff}
html[data-theme="dark"] .back-link{color:#7c8aa8}
html[data-theme="dark"] .back-link:hover{background:rgba(255,255,255,.05);color:#fff}
html[data-theme="dark"] .page-sub{color:#7c8aa8}
html[data-theme="dark"] .card{background:#141824;border-color:rgba(255,255,255,.06)}
html[data-theme="dark"] input,html[data-theme="dark"] textarea{background:#131828;border-color:rgba(255,255,255,.08);color:#fff}
html[data-theme="dark"] input::placeholder,html[data-theme="dark"] textarea::placeholder{color:#4c5776}
html[data-theme="dark"] label{color:#a3adc2}
html[data-theme="dark"] .hint{color:#7c8aa8}
html[data-theme="dark"] .stats-bar{background:rgba(108,99,246,.1);border-color:rgba(108,99,246,.25)}
html[data-theme="dark"] .stat .v{color:#a78bfa}
html[data-theme="dark"] .stat .l{color:#7c8aa8}
html[data-theme="dark"] .btn-ghost{color:#a3adc2}
html[data-theme="dark"] .btn-ghost:hover{background:rgba(255,255,255,.05);color:#fff}
html[data-theme="dark"] .msg-ok{color:#4ade80}
html[data-theme="dark"] .msg-err{color:#f87171}
html[data-theme="dark"] .msg-info{color:#8b9cff}
</style>
</head>
<body>

<div class="top">
    <div class="top-left">
        <a href="/admin" class="brand">
            <div class="brand-ic"><i class="fa fa-bullhorn"></i></div>
            Muslima Darmonova
        </a>
        <a href="/admin" class="back-link"><i class="fa fa-arrow-left"></i> Admin</a>
    </div>
    <button class="back-link" id="theme-toggle" title="Yorug'/Tungi rejim" style="border:none;background:transparent;cursor:pointer;font-family:inherit"><i class="fa fa-moon"></i></button>
</div>

<div class="wrap">
    <h1 class="page-title"><i class="fa fa-bullhorn" style="color:#6c63f6"></i> Xabar yuborish</h1>
    <p class="page-sub">Barcha faol foydalanuvchilarga Telegram orqali xabar jo'natish.</p>

    <div class="stats-bar">
        <div class="stat">
            <div class="v">{{ recipients }}</div>
            <div class="l">Faol foydalanuvchi</div>
        </div>
    </div>

    <div id="msg" class="msg"></div>

    <div class="card">
        <div class="row">
            <label for="text">Xabar matni <span style="color:#ef4444">*</span></label>
            <textarea id="text" placeholder="Salom! Bugun yangi kunlik test tayyor. Yeching!" maxlength="4000"></textarea>
            <div class="hint">HTML tag'lar qo'llab-quvvatlanadi: &lt;b&gt;, &lt;i&gt;, &lt;u&gt;, &lt;a href="…"&gt;. Maksimum 4000 belgi.</div>
        </div>

        <div class="row two">
            <div>
                <label for="button_text">Tugma matni (ixtiyoriy)</label>
                <input id="button_text" type="text" placeholder="Batafsil ko'rish" maxlength="60">
            </div>
            <div>
                <label for="button_url">Tugma havolasi</label>
                <input id="button_url" type="url" placeholder="https://…">
            </div>
        </div>
        <div class="hint" style="margin-top:-10px;margin-bottom:18px">Ikkalasi ham to'ldirilsa, xabar tagida tugma paydo bo'ladi.</div>

        <div style="display:flex;gap:10px;align-items:center">
            <button id="send" class="btn btn-primary"><i class="fa fa-paper-plane"></i> Yuborish</button>
            <button id="clear" class="btn btn-ghost" type="button">Tozalash</button>
        </div>
    </div>
</div>

<script>
const $ = (id) => document.getElementById(id);

function showMsg(kind, html){
    const el = $('msg');
    el.className = 'msg show msg-' + kind;
    el.innerHTML = html;
    if (kind === 'ok') setTimeout(() => { el.className = 'msg'; }, 6000);
}

$('clear').addEventListener('click', () => {
    $('text').value = ''; $('button_text').value = ''; $('button_url').value = '';
    $('msg').className = 'msg';
});

$('send').addEventListener('click', async () => {
    const text = $('text').value.trim();
    const button_text = $('button_text').value.trim();
    const button_url = $('button_url').value.trim();
    if (!text) { showMsg('err', "Xabar matni bo'sh"); return; }
    if ((button_text && !button_url) || (button_url && !button_text)) {
        showMsg('err', "Tugma matni va havolasi ikkalasini kiriting yoki ikkalasini bo'sh qoldiring");
        return;
    }
    if (!confirm("Xabarni barcha foydalanuvchilarga yuborishni tasdiqlaysizmi?")) return;

    const btn = $('send');
    btn.disabled = true; btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Yuborilmoqda…';
    showMsg('info', "Yuborilmoqda… Katta ro'yxatda bir necha daqiqa vaqt olishi mumkin.");

    try {
        const r = await fetch('/admin-tools/broadcast/send', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ text, button_text, button_url }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || 'Xatolik');
        showMsg('ok',
            `✅ Yuborildi: <b>${d.sent}</b> · Bloklangan: <b>${d.blocked}</b> · Xato: <b>${d.failed}</b> · Jami: <b>${d.total}</b>`
        );
    } catch(e){
        showMsg('err', e.message || 'Xatolik');
    } finally {
        btn.disabled = false; btn.innerHTML = '<i class="fa fa-paper-plane"></i> Yuborish';
    }
});

(function(){
    const KEY='malaka-admin-theme';
    function ico(t){return t==='dark'?'fa-sun':'fa-moon';}
    const btn=document.getElementById('theme-toggle');
    btn.querySelector('i').className='fa '+ico(document.documentElement.getAttribute('data-theme')||'light');
    btn.addEventListener('click',()=>{
        const next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
        document.documentElement.setAttribute('data-theme',next);
        try{localStorage.setItem(KEY,next);}catch(e){}
        btn.querySelector('i').className='fa '+ico(next);
    });
})();
</script>
</body>
</html>
