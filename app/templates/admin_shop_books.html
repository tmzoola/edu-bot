<!DOCTYPE html>
<html lang="uz">
<head>
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('malaka-admin-theme')||'light');}catch(e){}</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Do'kon kitoblari — Muslima Darmonova Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;color:#3b4256;min-height:100vh}
.top{background:#fff;border-bottom:1px solid rgba(0,0,0,.07);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.top-left{display:flex;align-items:center;gap:14px}
.brand{display:flex;align-items:center;gap:10px;color:#111827;font-weight:700;font-size:1rem;text-decoration:none}
.brand-icon{width:32px;height:32px;background:linear-gradient(135deg,#6c63f6,#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff}
.back-link{color:#6b7280;text-decoration:none;font-size:.85rem;display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;transition:.15s;border:none;background:transparent;cursor:pointer;font-family:inherit}
.back-link:hover{background:rgba(0,0,0,.04);color:#111827}
.wrap{max-width:1100px;margin:0 auto;padding:28px}
.page-title{font-size:1.75rem;font-weight:800;color:#111827;margin:0 0 4px}
.page-sub{color:#6b7280;font-size:.9rem;margin:0 0 24px}
.grid{display:grid;grid-template-columns:380px 1fr;gap:18px;align-items:start}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(16,24,40,.06)}
.card-head{padding:14px 20px;border-bottom:1px solid rgba(0,0,0,.07);display:flex;align-items:center;justify-content:space-between}
.card-head h3{margin:0;color:#111827;font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:10px}
.card-head .dot{width:6px;height:6px;background:#6c63f6;border-radius:50%}
.card-body{padding:18px 20px}
.label{display:block;font-size:.75rem;color:#6b7280;font-weight:600;margin:14px 0 6px;text-transform:uppercase;letter-spacing:.05em}
.label:first-child{margin-top:0}
.input,.textarea{width:100%;background:#fff;border:1px solid rgba(0,0,0,.14);border-radius:9px;padding:10px 14px;color:#1f2430;font-size:.9rem;font-family:inherit;transition:.15s}
.input:focus,.textarea:focus{outline:none;border-color:#6c63f6;box-shadow:0 0 0 3px rgba(108,99,246,.15)}
.textarea{resize:vertical;min-height:70px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Image upload zone */
.img-zone{border:2px dashed rgba(0,0,0,.14);border-radius:12px;text-align:center;cursor:pointer;transition:.15s;overflow:hidden;position:relative;min-height:120px;display:flex;align-items:center;justify-content:center}
.img-zone:hover,.img-zone.over{border-color:#6c63f6;background:rgba(108,99,246,.04)}
.img-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;color:#9ca3af;padding:24px 16px;pointer-events:none}
.img-placeholder i{font-size:1.8rem;color:#6c63f6}
.img-placeholder span{font-size:.82rem}
.img-preview{width:100%;height:180px;object-fit:cover;display:block}
.img-actions{display:flex;gap:8px;margin-top:8px}
.img-actions button{flex:1;padding:7px;border-radius:8px;border:1px solid rgba(0,0,0,.12);font-size:.78rem;font-weight:600;cursor:pointer;background:#fff;color:#374151;transition:.15s}
.img-actions button:hover{background:#f3f4f6}
.img-actions .del-img{border-color:#fca5a5;color:#dc2626}
.img-actions .del-img:hover{background:#fef2f2}
.uploading{font-size:.78rem;color:#6c63f6;margin-top:6px;display:none}

.toggle-row{display:flex;align-items:center;gap:10px;margin-top:14px}
.toggle{width:42px;height:24px;background:#e5e7eb;border-radius:12px;position:relative;cursor:pointer;transition:.2s;border:none;outline:none;flex-shrink:0}
.toggle::after{content:"";width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on{background:#6c63f6}
.toggle.on::after{left:21px}
.toggle-lbl{font-size:.85rem;color:#374151;font-weight:600}

.btn{border:none;cursor:pointer;font-weight:600;border-radius:9px;padding:11px 18px;font-size:.88rem;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.15s;font-family:inherit;width:100%}
.btn-primary{background:linear-gradient(135deg,#6c63f6,#8b5cf6);color:#fff;margin-top:18px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,99,246,.35)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:#f3f4f6;color:#374151;margin-top:8px}
.btn-secondary:hover{background:#e5e7eb}

/* Table */
table{width:100%;border-collapse:collapse}
thead th{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:#8b91a5;font-weight:600;padding:12px 16px;border-bottom:1px solid rgba(0,0,0,.07);text-align:left;background:#f7f8fc}
tbody td{padding:12px 16px;font-size:.85rem;color:#4b5563;border-bottom:1px solid rgba(0,0,0,.05);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
.b-title{color:#111827;font-weight:700}
.b-meta{font-size:.73rem;color:#8b91a5;margin-top:2px}
.cover-thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;border:1px solid rgba(0,0,0,.08)}
.cover-placeholder{width:48px;height:48px;border-radius:8px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;color:#9ca3af;font-size:1.2rem}
.price-tag{font-weight:700;color:#059669}
.chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:700}
.chip-on{background:#d1fae5;color:#065f46}
.chip-off{background:#f3f4f6;color:#6b7280}
.row-actions{display:flex;gap:6px}
.act{background:transparent;border:none;cursor:pointer;padding:6px 10px;border-radius:7px;font-size:.8rem;font-weight:600;transition:.15s}
.act-edit{color:#6c63f6;background:rgba(108,99,246,.08)}
.act-edit:hover{background:rgba(108,99,246,.18)}
.act-del{color:#dc2626;background:rgba(220,38,38,.06)}
.act-del:hover{background:rgba(220,38,38,.14)}
.empty{padding:40px;text-align:center;color:#9ca3af;font-size:.85rem}
.toast{position:fixed;top:24px;right:24px;background:#fff;border:1px solid rgba(0,0,0,.1);color:#111827;padding:12px 18px;border-radius:10px;font-size:.85rem;display:flex;align-items:center;gap:10px;box-shadow:0 10px 40px rgba(16,24,40,.18);transform:translateX(calc(100% + 40px));transition:transform .25s;z-index:200}
.toast.show{transform:translateX(0)}
.toast.ok{border-left:3px solid #22c98a}
.toast.err{border-left:3px solid #dc2626}

html[data-theme="dark"] body{background:#0f1420;color:#cdd3e0}
html[data-theme="dark"] .top{background:#0a0e18;border-bottom-color:rgba(255,255,255,.05)}
html[data-theme="dark"] .brand{color:#fff}
html[data-theme="dark"] .page-title{color:#fff}
html[data-theme="dark"] .page-sub{color:#7c8aa8}
html[data-theme="dark"] .card{background:#1a2035;border-color:rgba(255,255,255,.05);box-shadow:none}
html[data-theme="dark"] .card-head{border-bottom-color:rgba(255,255,255,.05)}
html[data-theme="dark"] .card-head h3{color:#fff}
html[data-theme="dark"] .label{color:#a3adc2}
html[data-theme="dark"] .input,html[data-theme="dark"] .textarea{background:#131828;border-color:rgba(255,255,255,.08);color:#fff}
html[data-theme="dark"] .input::placeholder,html[data-theme="dark"] .textarea::placeholder{color:#4c5776}
html[data-theme="dark"] thead th{background:#131828;color:#7c8aa8;border-bottom-color:rgba(255,255,255,.06)}
html[data-theme="dark"] tbody td{color:#a3adc2;border-bottom-color:rgba(255,255,255,.05)}
html[data-theme="dark"] .b-title{color:#e2e8f0}
html[data-theme="dark"] .b-meta{color:#6d7a94}
html[data-theme="dark"] .img-zone{border-color:rgba(255,255,255,.12)}
html[data-theme="dark"] .img-zone:hover,html[data-theme="dark"] .img-zone.over{border-color:#6c63f6;background:rgba(108,99,246,.08)}
html[data-theme="dark"] .img-placeholder{color:#6d7a94}
html[data-theme="dark"] .img-actions button{background:#131828;border-color:rgba(255,255,255,.12);color:#a3adc2}
html[data-theme="dark"] .img-actions button:hover{background:#1e2a42}
html[data-theme="dark"] .img-actions .del-img{border-color:rgba(248,113,113,.4);color:#f87171}
html[data-theme="dark"] .img-actions .del-img:hover{background:rgba(248,113,113,.1)}
html[data-theme="dark"] .cover-placeholder{background:#131828;color:#4c5776}
html[data-theme="dark"] .toggle{background:#2a3247}
html[data-theme="dark"] .toggle.on{background:#6c63f6}
html[data-theme="dark"] .btn-secondary{background:#1e2a42;color:#a3adc2}
html[data-theme="dark"] .btn-secondary:hover{background:#26314f}
html[data-theme="dark"] .back-link{color:#7c8aa8}
html[data-theme="dark"] .back-link:hover{background:rgba(255,255,255,.05);color:#fff}
html[data-theme="dark"] .toggle-lbl{color:#a3adc2}
html[data-theme="dark"] .chip-off{background:#1e2a42;color:#7c8aa8}
html[data-theme="dark"] .act-edit{background:rgba(108,99,246,.15)}
html[data-theme="dark"] .act-del{background:rgba(248,113,113,.1);color:#f87171}
html[data-theme="dark"] .empty{color:#6d7a94}
html[data-theme="dark"] .toast{background:#1e2439;border-color:rgba(255,255,255,.08);color:#fff;box-shadow:0 10px 40px rgba(0,0,0,.5)}
</style>
</head>
<body>
<div class="top">
  <div class="top-left">
    <a href="/admin/" class="brand">
      <div class="brand-icon"><i class="fa fa-book-open"></i></div>
      Muslima Darmonova Admin
    </a>
    <a href="/admin/" class="back-link"><i class="fa fa-chevron-left"></i> Admin panel</a>
  </div>
  <button class="back-link" id="theme-toggle" onclick="toggleTheme()">🌙</button>
</div>

<div class="wrap">
  <div class="page-title">📚 Do'kon kitoblari</div>
  <p class="page-sub">Sotuvdagi kitoblarni qo'shing, tahrirlang yoki o'chiring</p>

  <div class="grid">
    <!-- Form -->
    <div class="card">
      <div class="card-head">
        <h3><span class="dot"></span><span id="form-title">Yangi kitob qo'shish</span></h3>
        <button class="back-link" id="reset-btn" onclick="resetForm()" style="display:none">✕ Bekor</button>
      </div>
      <div class="card-body">
        <input type="hidden" id="edit-id">

        <label class="label">Kitob nomi *</label>
        <input id="f-title" class="input" placeholder="Masalan: Attestatsiya tayyorgarlik qo'llanmasi">

        <label class="label">Tavsif</label>
        <textarea id="f-desc" class="textarea" placeholder="Kitob haqida qisqacha ma'lumot…"></textarea>

        <div class="row2">
          <div>
            <label class="label">Narxi (so'm) *</label>
            <input id="f-price" class="input" type="number" min="0" placeholder="150000">
          </div>
          <div>
            <label class="label">Tartib raqami</label>
            <input id="f-order" class="input" type="number" min="0" value="0">
          </div>
        </div>

        <label class="label">Muqova rasmi</label>
        <div class="img-zone" id="img-zone" onclick="document.getElementById('img-file').click()">
          <input type="file" id="img-file" accept="image/*" style="display:none" onchange="handleImagePick(this)">
          <div class="img-placeholder" id="img-placeholder">
            <i class="fa fa-image"></i>
            <span>Rasm tanlash uchun bosing</span>
            <small style="font-size:.72rem;color:#c4cad8">PNG, JPG, WEBP · maks. 5 MB</small>
          </div>
          <img id="img-preview" class="img-preview" style="display:none" alt="">
        </div>
        <div class="uploading" id="uploading"><i class="fa fa-spinner fa-spin"></i> Yuklanmoqda…</div>
        <div class="img-actions" id="img-actions" style="display:none">
          <button onclick="changeImage()"><i class="fa fa-arrow-up-from-bracket"></i> Almashtirish</button>
          <button class="del-img" onclick="removeImage()"><i class="fa fa-trash"></i> O'chirish</button>
        </div>
        <input type="hidden" id="f-cover-url">

        <div class="toggle-row">
          <button class="toggle on" id="active-toggle" onclick="toggleActive()"></button>
          <span class="toggle-lbl">Faol (botda ko'rinadi)</span>
        </div>

        <button class="btn btn-primary" id="save-btn" onclick="saveBook()">
          <i class="fa fa-floppy-disk"></i> Saqlash
        </button>
        <button class="btn btn-secondary" id="reset-btn2" onclick="resetForm()" style="display:none">Bekor qilish</button>
      </div>
    </div>

    <!-- List -->
    <div class="card">
      <div class="card-head">
        <h3><span class="dot"></span>Mavjud kitoblar</h3>
        <span id="count" style="font-size:.8rem;color:#6b7280"></span>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>Muqova</th>
              <th>Nomi</th>
              <th>Narxi</th>
              <th>Holat</th>
              <th>Amal</th>
            </tr>
          </thead>
          <tbody id="books-tbody"></tbody>
        </table>
        <div id="count-footer" style="padding:10px 16px;font-size:.8rem;color:#6b7280">
          Jami: <b id="books-count">0</b> ta kitob
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BOOKS = {{ books | tojson }};
let isActive = true;
let coverUrl = '';

function esc(s){ const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; }
function fmtPrice(n){ return Number(n).toLocaleString('ru-RU').replace(/\s/g,' ') + ' so\'m'; }

function renderBooks(){
  const tbody = document.getElementById('books-tbody');
  document.getElementById('books-count').textContent = BOOKS.length;
  if(!BOOKS.length){
    tbody.innerHTML = '<tr><td colspan="5" class="empty">Hali kitob qo\'shilmagan</td></tr>';
    return;
  }
  tbody.innerHTML = BOOKS.map(b => `
    <tr id="row-${b.id}">
      <td>${b.cover_image_url
        ? `<img src="${esc(b.cover_image_url)}" class="cover-thumb" alt="">`
        : `<div class="cover-placeholder"><i class="fa fa-book"></i></div>`}</td>
      <td>
        <div class="b-title">${esc(b.title)}</div>
        ${b.description ? `<div class="b-meta">${esc(b.description.length>60 ? b.description.slice(0,60)+'…' : b.description)}</div>` : ''}
      </td>
      <td><span class="price-tag">${fmtPrice(b.price)}</span></td>
      <td><span class="chip ${b.is_active?'chip-on':'chip-off'}">${b.is_active?'Faol':'Nofaol'}</span></td>
      <td>
        <div class="row-actions">
          <button class="act act-edit" data-id="${b.id}"><i class="fa fa-pen"></i> Tahrirlash</button>
          <button class="act act-del" data-id="${b.id}"><i class="fa fa-trash"></i></button>
        </div>
      </td>
    </tr>
  `).join('');

  document.querySelectorAll('.act-edit[data-id]').forEach(btn => {
    btn.addEventListener('click', () => {
      const b = BOOKS.find(x => x.id == btn.dataset.id);
      if(b) editBook(b);
    });
  });
  document.querySelectorAll('.act-del[data-id]').forEach(btn => {
    btn.addEventListener('click', () => {
      const b = BOOKS.find(x => x.id == btn.dataset.id);
      if(b) deleteBook(b.id, b.title);
    });
  });
}

renderBooks();

function toast(msg, ok=true){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (ok ? 'ok' : 'err');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

function toggleActive(){
  isActive = !isActive;
  document.getElementById('active-toggle').className = 'toggle' + (isActive ? ' on' : '');
}

async function handleImagePick(input){
  const file = input.files[0];
  if(!file) return;
  document.getElementById('uploading').style.display = 'block';
  document.getElementById('img-placeholder').style.display = 'none';
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('img-actions').style.display = 'none';

  const fd = new FormData();
  fd.append('file', file);
  try {
    const r = await fetch('/admin-tools/upload-shop-image', {method:'POST', body:fd});
    const d = await r.json();
    if(!r.ok) throw new Error(d.detail || 'Xatolik');
    coverUrl = d.url;
    document.getElementById('f-cover-url').value = coverUrl;
    const img = document.getElementById('img-preview');
    img.src = coverUrl;
    img.style.display = 'block';
    document.getElementById('img-actions').style.display = 'flex';
    document.getElementById('img-zone').style.cursor = 'default';
    document.getElementById('img-zone').onclick = null;
    toast('Rasm yuklandi ✅');
  } catch(e){
    toast(e.message, false);
    document.getElementById('img-placeholder').style.display = '';
  } finally {
    document.getElementById('uploading').style.display = 'none';
  }
}

function changeImage(){
  document.getElementById('img-file').click();
}

function removeImage(){
  coverUrl = '';
  document.getElementById('f-cover-url').value = '';
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('img-actions').style.display = 'none';
  document.getElementById('img-placeholder').style.display = '';
  document.getElementById('img-zone').style.cursor = 'pointer';
  document.getElementById('img-zone').onclick = () => document.getElementById('img-file').click();
}

function resetForm(){
  document.getElementById('edit-id').value = '';
  document.getElementById('f-title').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-price').value = '';
  document.getElementById('f-order').value = '0';
  document.getElementById('form-title').textContent = 'Yangi kitob qo\'shish';
  document.getElementById('reset-btn').style.display = 'none';
  document.getElementById('reset-btn2').style.display = 'none';
  removeImage();
  isActive = true;
  document.getElementById('active-toggle').className = 'toggle on';
}

function editBook(b){
  document.getElementById('edit-id').value = b.id;
  document.getElementById('f-title').value = b.title;
  document.getElementById('f-desc').value = b.description || '';
  document.getElementById('f-price').value = b.price;
  document.getElementById('f-order').value = b.order;
  document.getElementById('form-title').textContent = 'Kitobni tahrirlash';
  document.getElementById('reset-btn').style.display = '';
  document.getElementById('reset-btn2').style.display = '';
  isActive = b.is_active;
  document.getElementById('active-toggle').className = 'toggle' + (b.is_active ? ' on' : '');

  coverUrl = b.cover_image_url || '';
  document.getElementById('f-cover-url').value = coverUrl;
  if(coverUrl){
    const img = document.getElementById('img-preview');
    img.src = coverUrl;
    img.style.display = 'block';
    document.getElementById('img-placeholder').style.display = 'none';
    document.getElementById('img-actions').style.display = 'flex';
    document.getElementById('img-zone').style.cursor = 'default';
    document.getElementById('img-zone').onclick = null;
  } else {
    removeImage();
  }
  document.getElementById('f-title').focus();
  window.scrollTo({top:0, behavior:'smooth'});
}

async function saveBook(){
  const title = document.getElementById('f-title').value.trim();
  const price = parseInt(document.getElementById('f-price').value || '0');
  if(!title){ toast('Kitob nomini kiriting', false); return; }
  if(!price){ toast('Narxni kiriting', false); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true;

  const payload = {
    id: document.getElementById('edit-id').value || null,
    title,
    description: document.getElementById('f-desc').value.trim() || null,
    price,
    order: parseInt(document.getElementById('f-order').value || '0'),
    cover_image_url: coverUrl || null,
    is_active: isActive,
  };

  try {
    const r = await fetch('/admin-tools/shop-books/save', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    const d = await r.json();
    if(!r.ok) throw new Error(d.detail || 'Xatolik');
    toast(payload.id ? 'Kitob yangilandi ✅' : 'Kitob qo\'shildi ✅');
    resetForm();
    setTimeout(() => location.reload(), 800);
  } catch(e){
    toast(e.message, false);
  } finally {
    btn.disabled = false;
  }
}

async function deleteBook(id, title){
  if(!confirm(`"${title}" ni o'chirasizmi?`)) return;
  const r = await fetch(`/admin-tools/shop-books/${id}`, {method:'DELETE'});
  if(r.ok){
    const idx = BOOKS.findIndex(b => b.id == id);
    if(idx !== -1) BOOKS.splice(idx, 1);
    renderBooks();
    toast('Kitob o\'chirildi');
  } else {
    toast('Xatolik', false);
  }
}

function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('malaka-admin-theme', next);
  document.getElementById('theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
}
const t = localStorage.getItem('malaka-admin-theme');
if(t === 'dark') document.getElementById('theme-toggle').textContent = '☀️';
</script>
</body>
</html>
