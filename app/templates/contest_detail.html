{% extends "_base.html" %}
{% set nav_active = 'contests' %}
{% block title %}Yutuqli test — Muslima Darmonova{% endblock %}

{% block head %}
<style>
.hero{background:linear-gradient(135deg,#F59E0B,#EA580C);color:#fff;border-radius:20px;padding:22px;margin-bottom:14px;box-shadow:0 8px 22px rgba(234,88,12,.24)}
.hero .tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:99px;font-size:.72rem;font-weight:700;margin-bottom:12px}
.hero h1{font-size:1.35rem;font-weight:800;margin-bottom:6px;line-height:1.25}
.hero .desc{opacity:.94;font-size:.86rem;line-height:1.5}
.hero .prize{margin-top:14px;padding:10px 14px;background:rgba(255,255,255,.18);border-radius:12px;font-weight:700;font-size:.88rem}

.info{background:#fff;border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.05);font-size:.85rem}
.info-row:last-child{border-bottom:none}
.info-row .k{color:var(--muted)}
.info-row .v{color:#111;font-weight:700}

.countdown{background:#fff;border-radius:16px;padding:16px;text-align:center;box-shadow:var(--shadow);margin-bottom:14px}
.cd-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.cd-cell{background:#F4F5F2;border-radius:10px;padding:10px 4px}
.cd-val{font-size:1.5rem;font-weight:800;color:var(--green-dark);line-height:1}
.cd-lbl{font-size:.62rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.cd-t{font-size:.78rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em}

.result-box{background:#E4F3EB;border:1px solid rgba(34,197,138,.3);border-radius:14px;padding:16px;margin-bottom:14px}
.result-box h3{font-size:.9rem;font-weight:800;color:var(--green-dark);margin-bottom:8px}
.result-box .rs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.result-box .rc{background:#fff;border-radius:10px;padding:10px;text-align:center}
.result-box .rc .v{font-size:1.15rem;font-weight:800;color:#111}
.result-box .rc .l{font-size:.68rem;color:var(--muted);font-weight:700;text-transform:uppercase}

.btn-warn{background:linear-gradient(135deg,#F59E0B,#EA580C);color:#fff;box-shadow:0 4px 14px rgba(234,88,12,.35)}
.btn-warn:active{transform:scale(.98)}
</style>
{% endblock %}

{% block header %}
<header class="hdr">
  <a href="/webapp/contests" class="hdr-back">←</a>
  <div class="hdr-title">Yutuqli test</div>
  <div class="hdr-right"></div>
</header>
{% endblock %}

{% block content %}
<div id="root">
    <div class="empty" style="padding:40px 20px">Yuklanmoqda…</div>
</div>
{% endblock %}

{% block script %}
<script>
const CONTEST_ID = {{ contest_id }};

(async function(){
    await MK.ensureAuth();
    const r = await fetch(`/api/v1/webapp/contests/${CONTEST_ID}`, { headers: MK.authHeaders() });
    if (!r.ok) {
        document.getElementById('root').innerHTML = '<div class="empty">Test topilmadi</div>';
        return;
    }
    const c = await r.json();
    render(c);
})();

function render(c){
    const st = c.status;
    const stLbl = st === 'live' ? '🟢 Ochiq' : st === 'upcoming' ? '⏰ Kutilmoqda' : '✓ Tugadi';

    let html = `
        <div class="hero">
            <div class="tag"><span>${stLbl}</span></div>
            <h1>${esc(c.title)}</h1>
            ${c.description ? `<div class="desc">${esc(c.description)}</div>` : ''}
            ${c.prize ? `<div class="prize">🎁 ${esc(c.prize)}</div>` : ''}
        </div>

        <div class="info">
            <div class="info-row"><span class="k">Boshlanish</span><span class="v">${fmtDate(c.start_at)}</span></div>
            <div class="info-row"><span class="k">Tugash</span><span class="v">${fmtDate(c.end_at)}</span></div>
            <div class="info-row"><span class="k">Savollar soni</span><span class="v">${c.question_count} ta</span></div>
            <div class="info-row"><span class="k">Vaqt chegarasi</span><span class="v">${fmtDur(c.time_limit_seconds)}</span></div>
            <div class="info-row"><span class="k">Ishtirokchilar</span><span class="v">${c.participants} kishi</span></div>
        </div>
    `;

    if (c.my_attempt) {
        const a = c.my_attempt;
        html += `
            <div class="result-box">
                <h3>✅ Sizning natijangiz</h3>
                <div class="rs">
                    <div class="rc"><div class="v">${a.score}/${a.total}</div><div class="l">To'g'ri</div></div>
                    <div class="rc"><div class="v">${a.percentage}%</div><div class="l">Foiz</div></div>
                    <div class="rc"><div class="v">${MK.fmtTime(a.time_taken_seconds)}</div><div class="l">Vaqt</div></div>
                </div>
                <div style="margin-top:10px;font-size:.75rem;color:var(--muted);text-align:center">${a.completed_at}</div>
            </div>
            <a href="/webapp/contests/${CONTEST_ID}/winners" class="btn btn-primary">🏆 G'oliblar ro'yxati</a>
        `;
    } else if (st === 'live') {
        html += `<a href="/webapp/contests/${CONTEST_ID}/play" class="btn btn-warn">🚀 Boshlash</a>
                 <div style="text-align:center;font-size:.75rem;color:var(--muted);margin-top:10px">Bir marta ishtirok etish mumkin. Diqqatli bo'ling!</div>`;
    } else if (st === 'upcoming') {
        html += `<div class="countdown">
                    <div class="cd-t">Boshlanishga qoldi</div>
                    <div class="cd-grid" id="cd">
                        <div class="cd-cell"><div class="cd-val" id="cd-d">0</div><div class="cd-lbl">Kun</div></div>
                        <div class="cd-cell"><div class="cd-val" id="cd-h">0</div><div class="cd-lbl">Soat</div></div>
                        <div class="cd-cell"><div class="cd-val" id="cd-m">0</div><div class="cd-lbl">Daq</div></div>
                        <div class="cd-cell"><div class="cd-val" id="cd-s">0</div><div class="cd-lbl">Son</div></div>
                    </div>
                </div>`;
    } else {
        html += `<a href="/webapp/contests/${CONTEST_ID}/winners" class="btn btn-primary">🏆 G'oliblarni ko'rish</a>`;
    }

    document.getElementById('root').innerHTML = html;

    if (st === 'upcoming') startCountdown(c.start_at);
}

function startCountdown(iso){
    const target = new Date(iso).getTime();
    function tick(){
        const diff = Math.max(0, target - Date.now());
        const s = Math.floor(diff/1000);
        document.getElementById('cd-d').textContent = Math.floor(s/86400);
        document.getElementById('cd-h').textContent = Math.floor((s%86400)/3600);
        document.getElementById('cd-m').textContent = Math.floor((s%3600)/60);
        document.getElementById('cd-s').textContent = s%60;
        if (diff <= 0) location.reload();
    }
    tick(); setInterval(tick, 1000);
}

function fmtDate(iso){
    if(!iso) return '—';
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleString('uz-UZ', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
function fmtDur(s){
    const m = Math.floor(s/60), sec = s%60;
    if (m >= 60) return `${Math.floor(m/60)} soat ${m%60} daq.`;
    return `${m} daq.${sec ? ' '+sec+' son.' : ''}`;
}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
</script>
{% endblock %}
